<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>espAGC DSKY</title>
<style>
  :root { color-scheme: dark; }
  body  { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
          background:#000; color:#eee; margin:0; padding:1rem; }
  h1    { font-size:1rem; margin:0 0 .8rem; color:#FFB000; }
  .pad  { display:grid; grid-template-columns:repeat(3, 4rem); gap:.5rem; }
  button{ font:inherit; padding:.6rem; background:#222; color:#FFB000;
          border:1px solid #444; border-radius:.4rem; cursor:pointer; }
  button:active { background:#444; }
  .verb,.noun,.entr,.pro,.rset,.clr,.krel { background:#332600; color:#FFD060; }
  .log  { margin-top:1rem; font-size:.8rem; opacity:.6; max-height:6rem; overflow:auto; }
</style>

<h1>espAGC — virtual DSKY</h1>

<div class="pad">
  <button class="verb"  data-key="VRB">VERB</button>
  <button class="noun"  data-key="NUN">NOUN</button>
  <button class="rset"  data-key="RSET">RSET</button>

  <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
  <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
  <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>

  <button class="clr"   data-key="CLR">CLR</button>
  <button data-key="0">0</button>
  <button class="entr"  data-key="ENTR">ENTR</button>

  <button data-key="+">+</button><button data-key="-">-</button>
  <button class="pro"   data-key="PRO">PRO</button>

  <button class="krel"  data-key="KREL">KEY&nbsp;REL</button>
</div>

<pre class="log" id="log"></pre>

<script>
  const log = (m) => {
    const el = document.getElementById('log');
    el.textContent = (m + '\n' + el.textContent).slice(0, 2000);
  };
  const send = (k) =>
    fetch('/key', { method: 'POST', body: k })
      .then(r => log((r.ok ? '→ ' : 'X ') + k))
      .catch(e => log('err: ' + e));
  document.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => send(b.dataset.key));
  });
  addEventListener('keydown', (e) => {
    const map = {
      Enter:'ENTR', Backspace:'CLR',
      v:'VRB', V:'VRB', n:'NUN', N:'NUN', p:'PRO', P:'PRO',
      r:'RSET', R:'RSET', k:'KREL', K:'KREL',
    };
    const tok = map[e.key] ?? (/^[0-9+\-]$/.test(e.key) ? e.key : null);
    if (tok) send(tok);
  });
</script>
